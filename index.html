<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Metadata -->
    <title>AutoFlow — Premium AI Platform for Automated Data Workloads</title>
    <meta name="description" content="AutoFlow automates your logical branch tasks, model tuning, and data ingestion processes with bank-grade encryption and isolated VPC boundaries." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://autoflow-hackathon.vercel.app" />

    <!-- Open Graph (OG) / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://autoflow-hackathon.vercel.app" />
    <meta property="og:title" content="AutoFlow — Premium AI Platform for Automated Data Workloads" />
    <meta property="og:description" content="AutoFlow automates your logical branch tasks, model tuning, and data ingestion processes with bank-grade encryption and isolated VPC boundaries." />
    <meta property="og:image" content="https://autoflow-hackathon.vercel.app/og-image.png" />
    <meta property="og:site_name" content="AutoFlow" />

    <!-- Twitter Card Metadata -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://autoflow-hackathon.vercel.app" />
    <meta name="twitter:title" content="AutoFlow — Premium AI Platform for Automated Data Workloads" />
    <meta name="twitter:description" content="AutoFlow automates your logical branch tasks, model tuning, and data ingestion processes with bank-grade encryption and isolated VPC boundaries." />
    <meta name="twitter:image" content="https://autoflow-hackathon.vercel.app/og-image.png" />

    <!-- Structured Data: JSON-LD for SoftwareApplication and Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "AutoFlow",
        "operatingSystem": "All",
        "applicationCategory": "BusinessApplication",
        "description": "Premium AI-driven data automation and ingestion platform.",
        "offers": {
          "@type": "AggregateOffer",
          "priceCurrency": "USD",
          "lowPrice": "29.00",
          "highPrice": "149.00",
          "offerCount": "3"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "AutoFlow AI Inc.",
        "url": "https://autoflow-hackathon.vercel.app",
        "logo": "https://autoflow-hackathon.vercel.app/favicon.svg",
        "sameAs": [
          "https://github.com/autoflow",
          "https://x.com/autoflow"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
